name: Build and deploy Node.js app to Azure Web App - csc307-teamproject-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: npm install, build, and test (backend only)
        run: |
          npm ci --workspaces=false
          npm run build --if-present
          npm run test --if-present
        working-directory: packages/express-backend

      - name: Upload artifact for deployment job (backend only)
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: packages/express-backend

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F86F10A57FFB4C2BA98F1F76F4EB19A7 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_519A19EFCCA6406DB27ACCA743A0CD4D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6E38BD4EDE0345D8A114832873027D71 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'csc307-teamproject-api'
          slot-name: 'Production'
          package: packages/express-backend